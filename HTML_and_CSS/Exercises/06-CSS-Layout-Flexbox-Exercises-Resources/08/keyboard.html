<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./keyboard.css">
</head>

<body>
    <div  class="keyboard">
        <div class="keyboard-btns">
            <section>
                <button class="main-btn gray">esc</button>
                <button class="main-btn gray">f1</button>
                <button class="main-btn gray">f2</button>
                <button class="main-btn gray">f3</button>
                <button class="main-btn gray">f4</button>
                <button class="main-btn gray">f5</button>
                <button class="main-btn gray">f6</button>
                <button class="main-btn gray">f7</button>
                <button class="main-btn gray">f8</button>
                <button class="main-btn gray">f9</button>
                <button class="main-btn gray">f10</button>
                <button class="main-btn gray">f11</button>
                <button class="main-btn gray">f12</button>
                <button class="main-btn gray">f13</button>
            </section>

            <section>
                <button class="symbols white">§</button>
                <button class="symbols white">1</button>
                <button class="symbols white">2</button>
                <button class="symbols white">3</button>
                <button class="symbols white">4</button>
                <button class="symbols white">5</button>
                <button class="symbols white">6</button>
                <button class="symbols white">7</button>
                <button class="symbols white">8</button>
                <button class="symbols white">9</button>
                <button class="symbols white">0</button>
                <button class="symbols white">-</button>
                <button class="symbols white">+</button>
                <button class="gray">backspace</button>
            </section>

            <section>
                <button class="gray">tab</button>
                <button class="symbols white">Q</button>
                <button class="symbols white">W</button>
                <button class="symbols white">E</button>
                <button class="symbols white">R</button>
                <button class="symbols white">T</button>
                <button class="symbols white">Y</button>
                <button class="symbols white">U</button>
                <button class="symbols white">I</button>
                <button class="symbols white">O</button>
                <button class="symbols white">P</button>
                <button class="symbols white">[</button>
                <button class="symbols white">]</button>
                <button class="enter-top gray">Enter</button>
            </section>

            <section>
                <button class="caps-lock gray">caps lock</button>
                <button class="symbols white">A</button>
                <button class="symbols white">S</button>
                <button class="symbols white">D</button>
                <button class="symbols white">F</button>
                <button class="symbols white">G</button>
                <button class="symbols white">H</button>
                <button class="symbols white">J</button>
                <button class="symbols white">K</button>
                <button class="symbols white">L</button>
                <button class="symbols white">;</button>
                <button class="symbols white">'</button>
                <button class="symbols white">\</button>
                <button class="enter-bottom gray"></button>
            </section>

            <section>
                <button class="gray">shift</button>
                <button class="symbols white">`</button>
                <button class="symbols white">Z</button>
                <button class="symbols white">X</button>
                <button class="symbols white">C</button>
                <button class="symbols white">V</button>
                <button class="symbols white">B</button>
                <button class="symbols white">N</button>
                <button class="symbols white">M</button>
                <button class="symbols white">,</button>
                <button class="symbols white">.</button>
                <button class="symbols white">/</button>
                <button class="gray big-shift">shift</button>
            </section>

            <section>
                <button class="gray">ctrl</button>
                <button class="gray">win</button>
                <button class="gray">alt</button>
                <button class="space white"></button>
                <button class="gray">alt</button>
                <button class="gray">win</button>
                <button class="gray">ctrl</button>
            </section>
        </div>
    </div>
</body>

</html>
