<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./calendar.css">
</head>

<body>
    <main>
        <div class="calendar">
            <section class="weekdays">
                <div>Workweek</div>
                <article>
                    <div>1 Monday</div>
                    <div>2 Thuesday</div>
                    <div>3 Wednesday</div>
                    <div>4 Thursday</div>
                    <div>5 Friday</div>
                </article>
                <div>Weekend</div>
                <article>
                    <div>6 Saturday</div>
                    <div>7 Sunday</div>
                </article>
            </section>
            <section class="additional-info">
                <article>
                    <div>REMINDERS</div>
                </article>
                <article>
                    <div>SPECIAL DATES</div>
                </article>
            </section>
        </div>
    </main>
</body>

</html>
