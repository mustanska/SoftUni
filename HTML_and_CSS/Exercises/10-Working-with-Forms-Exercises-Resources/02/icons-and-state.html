<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./icons-and-state.css">
</head>
<body>
    <form action="">

        <fieldset>
            <legend>Login</legend>

            <p class="field">
                <input type="email" name="email" id="email" aria-describedby="email-help" required>
                 <label for="email">Email</label>
                 <small id="email-help">example:konstantin.dakov@gmail.com</small>
            </p>

            <p class="field">
                <input type="password" name="password" id="password" aria-describedby="pass-help" minlength="6" required>
                <label for="password">Password</label>
                <small id="pass-help">minimum 6 characters, letters and numbers, at least 1 special character</small>
            </p>

            <input type="submit" value="Login">
        </fieldset>

    </form>

</body>
</html>
