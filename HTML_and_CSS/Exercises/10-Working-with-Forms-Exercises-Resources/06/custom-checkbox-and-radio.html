<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./custom-checkbox-and-radio.css">
</head>

<body>
    <form action="">
        <section class="radio">
            <h3>Radio</h3>

            <article>
                <input type="radio" name="radio" id="option-1">
                <label for="option-1">Option 1</label>
            </article>

            <article>
                <input type="radio" name="radio" id="option-2">
                <label for="option-2">Option 2</label>
            </article>

        </section>
        <section class="checkbox">
            <h3>Checkbox</h3>

            <article>
                <input type="checkbox" name="checkbox" id="checkbox-1">
                <label for="checkbox-1">Checkbox 1</label>
            </article>

            <article>
                <input type="checkbox" name="checkbox" id="checkbox-2">
                <label for="checkbox-2">Checkbox 2</label>
            </article>
            
        </section>
    </form>
</body>

</html>
