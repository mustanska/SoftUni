<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Form</title>
    <link rel="stylesheet" href="./signup-form.css">
</head>

<body>
    <form action="">
        <ul>
            <li class="signup"><a href="#">Sign Up</a></li>
            <li class="login"><a href="#">Log In</a></li>
        </ul>

        <h2>Sign Up for Free</h2>

        <div class="input-groups first-name">
            <input type="text" name="first-name" id="first-name" placeholder=" " required>
            <label for="first-name">First Name</label>
        </div>
        <div class="input-groups last-name">
            <input type="text" name="last-name" id="last-name" placeholder=" " required>
            <label for="last-name">Last Name</label>
        </div>
        <div class="input-groups email">
            <input type="email" name="email" id="email" placeholder=" " required>
            <label for="email">Email Address</label>
        </div>
        <div class="input-groups password">
            <input type="password" name="password" id="password" placeholder=" " required>
            <label for="password">Set A Password</label>
        </div>
        <button>GET STARTED</button>
    </form>
</body>

</html>
