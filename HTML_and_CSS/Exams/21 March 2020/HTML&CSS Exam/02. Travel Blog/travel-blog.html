<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Blog</title>
    <link rel="stylesheet" href="./travel-blog.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="./Requirements-and-Resources/images/logo.png" alt="logo">
            </div>
            <div class="buttons">
                <button>Log In</button>
                <button><i class="fas fa-search"></i></button>
            </div>
        </nav>
        <div class="title">
            <h1>Make the most of every trip</h1>
            <button>Start Now</button>
        </div>
    </header>

    <main>
        <h3>Articles</h3>
        <section>
            <article class="packing">
                <img src="./Requirements-and-Resources/images/packing.jpg" alt="packing">
                <p>How to pack effectively</p>
            </article>
            <article class="planning">
                <img src="./Requirements-and-Resources/images/planning.jpg" alt="planning">
                <p>Plan your next trip like never before</p>
            </article>
            <article class="budget">
                <img src="./Requirements-and-Resources/images/budget.jpg" alt="budget">
                <p>Budget like a pro</p>
            </article>
        </section>
    </main>

    <footer>
        <ul>
            <li>About</li>
            <li>Team</li>
            <li>Events</li>
            <li>Jobs</li>
        </ul>
        <ul>
            <li>FAQ</li>
            <li>My Orders</li>
            <li>Favorites</li>
            <li>Contacts</li>
        </ul>
        <ul>
            <li>&copy; 2020</li>
            <li>Terms</li>
            <li>Privacy</li>
        </ul>
    </footer>
</body>

</html>
